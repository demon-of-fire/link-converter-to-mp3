<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>MP3/MP4 Converter</title>\n    <style>\n        body { font-family: Arial, sans-serif; background-color: white; color: black; }\n        .dark-mode { background-color: black; color: white; }\n        .hidden { display: none; }\n    </style>\n</head>\n<body>\n    <h1>Accessible MP3/MP4 Converter</h1>\n    <button aria-label="Toggle dark/light mode" onclick="toggleMode()">Toggle Dark/Light Mode</button>\n    <label for="contrast">Adjust Contrast:</label>\n    <input type="range" id="contrast" min="0" max="2" step="0.1" onchange="adjustContrast(this.value)">\n    <label for="textSize">Text Size:</label>\n    <input type="range" id="textSize" min="10" max="30" value="16" onchange="adjustTextSize(this.value)">\n    <label for="platform">Select Platform:</label>\n    <select id="platform">\n        <option value="windows">Windows</option>\n        <option value="mac">Mac</option>\n        <option value="linux">Linux</option>\n    </select>\n    <label for="linkInput">Input Link:</label>\n    <input type="url" id="linkInput" aria-required="true" placeholder="Enter your media link here...">\n    <label for="format">Select Format:</label>\n    <select id="format">\n        <option value="mp3">MP3</option>\n        <option value="mp4">MP4</option>\n    </select>\n    <label for="quality">Select Quality:</label>\n    <select id="quality">\n        <option value="low">Low</option>\n        <option value="medium">Medium</option>\n        <option value="high">High</option>\n    </select>\n    <button onclick="downloadMedia()">Download</button>\n    <div id="progressDialog" class="hidden">Downloading... <span id="progressPercentage">0%</span></div>\n    <script>\n        function toggleMode() {\n            document.body.classList.toggle('dark-mode');\n        }\n        function adjustContrast(value) {\n            document.body.style.filter = `contrast(${value})`;\n        }\n        function adjustTextSize(value) {\n            document.body.style.fontSize = value + 'px';\n        }\n        function downloadMedia() {\n            const progressDialog = document.getElementById('progressDialog');\n            progressDialog.classList.remove('hidden');\n            let percentage = 0;\n            const interval = setInterval(() => {\n                if (percentage >= 100) {\n                    clearInterval(interval);\n                    progressDialog.classList.add('hidden');\n                    alert('Download complete!');\n                } else {\n                    percentage += 10;\n                    document.getElementById('progressPercentage').innerText = percentage + '%';\n                }\n            }, 1000);\n        }\n    <\/script>\n</body>\n</html>
