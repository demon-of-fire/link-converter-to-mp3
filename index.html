<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Converter</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #222; color: #eee; }
        h1 { text-align: center; }
        .toggle { cursor: pointer; }
        .hidden { display: none; }
        .container { margin: auto; max-width: 600px; }
        .progress { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Link Converter to MP3</h1>
        <div>
            <label for="platform">Select Platform:</label>
            <select id="platform">
                <option value="youtube">YouTube</option>
                <option value="soundcloud">SoundCloud</option>
                <option value="vimeo">Vimeo</option>
            </select>
        </div>
        <div>
            <label for="link">Enter Link:</label>
            <input type="url" id="link" placeholder="Enter the link here" required />
        </div>
        <div>
            <label for="format">Select Format:</label>
            <select id="format">
                <option value="mp3">MP3</option>
                <option value="wav">WAV</option>
            </select>
        </div>
        <div>
            <label for="quality">Select Quality:</label>
            <select id="quality">
                <option value="low">Low (64 kbps)</option>
                <option value="medium">Medium (128 kbps)</option>
                <option value="high">High (320 kbps)</option>
            </select>
        </div>
        <button id="downloadBtn">Download</button>
        <div id="progress" class="progress hidden">Downloading... <span id="progressPercentage">0%</span></div>
        <div>
            <label for="textSize">Text Size:</label>
            <input type="range" id="textSize" min="10" max="32" value="16" />
        </div>
        <div class="toggle" id="darkModeToggle">Toggle Dark Mode</div>
    </div>
    <script>
        const downloadBtn = document.getElementById('downloadBtn');
        const progress = document.getElementById('progress');
        const progressPercentage = document.getElementById('progressPercentage');
        const textSize = document.getElementById('textSize');
        const darkModeToggle = document.getElementById('darkModeToggle');

        downloadBtn.onclick = function() {
            progress.classList.remove('hidden');
            let percentage = 0;
            const interval = setInterval(() => {
                if (percentage < 100) {
                    percentage += 10;
                    progressPercentage.textContent = percentage + '%';
                } else {
                    clearInterval(interval);
                }
            }, 500);
        };

        textSize.oninput = function() {
            document.body.style.fontSize = this.value + 'px';
        };

        darkModeToggle.onclick = function() {
            document.body.classList.toggle('dark');
            document.body.style.backgroundColor = document.body.style.backgroundColor === 'black' ? '#222' : 'black';
            document.body.style.color = document.body.style.color === 'white' ? '#eee' : 'white';
        };
    </script>
</body>
</html>
